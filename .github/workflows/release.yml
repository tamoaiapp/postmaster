name: Build + Release PostMaster

on:
  push:
    branches: [main]
    paths:
      - package.json
      - main.js
      - preload.js
      - 'src/**'
      - 'renderer/**'
      - 'models/**'
      - 'bin/**'
      - electron-builder.yml
      - '.github/workflows/release.yml'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version
        id: ver
        shell: pwsh
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $ver = $pkg.version
          echo "version=$ver" >> $env:GITHUB_OUTPUT
          echo "tag=v$ver" >> $env:GITHUB_OUTPUT

      - name: Check if release already exists
        id: check
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          gh release view $tag --repo ${{ github.repository }} --json url *> $null
          $code = $LASTEXITCODE
          $global:LASTEXITCODE = 0
          if ($code -eq 0) {
            "skip=true" | Add-Content $env:GITHUB_OUTPUT
            Write-Host "Release $tag ja existe — pulando build."
          } else {
            "skip=false" | Add-Content $env:GITHUB_OUTPUT
            Write-Host "Release $tag NAO existe — vamos buildar."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Node 22
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Disable code signing (sem cert)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> $env:GITHUB_ENV

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci --no-audit --no-fund

      - name: Baixa bin/deno.exe (122MB, fora do repo)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $url = 'https://github.com/denoland/deno/releases/download/v2.1.4/deno-x86_64-pc-windows-msvc.zip'
          $zip = "$env:RUNNER_TEMP\deno.zip"
          # Retry 4x — GitHub releases ocasionalmente retorna HTML "Unicorn!" 503
          $ok = $false
          for ($i = 1; $i -le 4 -and -not $ok; $i++) {
            try {
              Invoke-WebRequest $url -OutFile $zip -MaximumRedirection 5 -ErrorAction Stop
              # Valida: ZIP de verdade tem >10MB e magic PK\x03\x04
              $size = (Get-Item $zip).Length
              $bytes = [IO.File]::ReadAllBytes($zip)[0..1]
              if ($size -gt 10MB -and $bytes[0] -eq 0x50 -and $bytes[1] -eq 0x4B) {
                $ok = $true; break
              }
              Write-Host "Tentativa ${i}: download invalido (${size} bytes, magic $($bytes -join ','))"
            } catch {
              Write-Host "Tentativa ${i} falhou: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds (5 * $i)
          }
          if (-not $ok) { throw "deno.zip nao baixou em 4 tentativas" }
          Expand-Archive $zip -DestinationPath bin -Force
          if (-not (Test-Path bin\deno.exe)) { throw "deno.exe nao extraido" }
          (Get-Item bin\deno.exe).Length / 1MB

      - name: Baixa bin/yt-dlp.exe
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $url = 'https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe'
          # Retry 4x — GitHub flake comum
          $ok = $false
          for ($i = 1; $i -le 4 -and -not $ok; $i++) {
            try {
              Invoke-WebRequest $url -OutFile bin\yt-dlp.exe -MaximumRedirection 5 -ErrorAction Stop
              # Valida: yt-dlp.exe >5MB e PE magic MZ
              $size = (Get-Item bin\yt-dlp.exe).Length
              $bytes = [IO.File]::ReadAllBytes('bin\yt-dlp.exe')[0..1]
              if ($size -gt 5MB -and $bytes[0] -eq 0x4D -and $bytes[1] -eq 0x5A) {
                $ok = $true; break
              }
              Write-Host "Tentativa ${i}: download invalido (${size} bytes, magic $($bytes -join ','))"
            } catch {
              Write-Host "Tentativa ${i} falhou: $($_.Exception.Message)"
            }
            Start-Sleep -Seconds (5 * $i)
          }
          if (-not $ok) { throw "yt-dlp.exe nao baixou em 4 tentativas" }
          (Get-Item bin\yt-dlp.exe).Length / 1MB

      - name: Baixa whisper.cpp + modelo small + Piper TTS + vozes BR (dublagem YT)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        continue-on-error: true  # nao quebra build se download falhar — feature so vira ativa quando tudo presente
        run: |
          # 1. whisper.cpp Windows binary (cli)
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          $whisperZip = "$env:RUNNER_TEMP\whisper-cli.zip"
          $whisperUrl = 'https://github.com/ggml-org/whisper.cpp/releases/latest/download/whisper-bin-x64.zip'
          try {
            Invoke-WebRequest $whisperUrl -OutFile $whisperZip -ErrorAction Stop
            Expand-Archive $whisperZip -DestinationPath "$env:RUNNER_TEMP\whisper" -Force
            # whisper.cpp latest tem 'whisper-cli.exe' (real) E 'main.exe' (deprecation
            # shim que so imprime warning + exit 1). Prioriza whisper-cli.exe explicitamente,
            # fallback pra main.exe so se nao tiver (releases antigos).
            $whisperExe = Get-ChildItem -Recurse "$env:RUNNER_TEMP\whisper" -File -Filter 'whisper-cli.exe' | Select-Object -First 1
            if (-not $whisperExe) {
              $whisperExe = Get-ChildItem -Recurse "$env:RUNNER_TEMP\whisper" -File -Filter 'main.exe' | Select-Object -First 1
            }
            if ($whisperExe) {
              Copy-Item $whisperExe.FullName "bin\whisper-cli.exe" -Force
              # Copia DLLs ao lado (whisper precisa)
              Get-ChildItem $whisperExe.DirectoryName -Filter "*.dll" | ForEach-Object { Copy-Item $_.FullName "bin\$($_.Name)" -Force }
              Write-Host "whisper-cli.exe: OK"
            }
          } catch { Write-Host "whisper-cli download falhou: $($_.Exception.Message)" }

          # 2. Modelo Whisper small (244MB) — pt_BR funciona muito bem
          $modelUrl = 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin'
          try {
            Invoke-WebRequest $modelUrl -OutFile "bin\ggml-small.bin" -ErrorAction Stop
            Write-Host "Modelo Whisper small: $((Get-Item bin\ggml-small.bin).Length / 1MB) MB"
          } catch { Write-Host "Modelo Whisper falhou: $($_.Exception.Message)" }

          # 3. Piper TTS Windows binary
          New-Item -ItemType Directory -Force -Path bin\piper | Out-Null
          $piperZip = "$env:RUNNER_TEMP\piper.zip"
          $piperUrl = 'https://github.com/rhasspy/piper/releases/download/2023.11.14-2/piper_windows_amd64.zip'
          try {
            Invoke-WebRequest $piperUrl -OutFile $piperZip -ErrorAction Stop
            Expand-Archive $piperZip -DestinationPath "$env:RUNNER_TEMP\piper-extracted" -Force
            Get-ChildItem -Recurse "$env:RUNNER_TEMP\piper-extracted" -File | ForEach-Object {
              Copy-Item $_.FullName "bin\piper\$($_.Name)" -Force
            }
            Write-Host "Piper TTS: OK"
          } catch { Write-Host "Piper download falhou: $($_.Exception.Message)" }

          # 4. Vozes BR pre-treinadas
          $voices = @(
            @{ name='faber-medium'; model='https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx'; config='https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/faber/medium/pt_BR-faber-medium.onnx.json' },
            @{ name='cadu-medium'; model='https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx'; config='https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx.json' }
          )
          foreach ($v in $voices) {
            try {
              Invoke-WebRequest $v.model -OutFile "bin\piper\pt_BR-$($v.name).onnx" -ErrorAction Stop
              Invoke-WebRequest $v.config -OutFile "bin\piper\pt_BR-$($v.name).onnx.json" -ErrorAction Stop
              Write-Host "Voz $($v.name): OK"
            } catch { Write-Host "Voz $($v.name) falhou: $($_.Exception.Message)" }
          }

          Write-Host "=== bin/ apos download ==="
          Get-ChildItem bin -Recurse | Select-Object Name,@{N='MB';E={[math]::Round($_.Length/1MB,2)}} | Format-Table -AutoSize

      - name: Install Playwright Chromium + headless_shell + ffmpeg
        if: steps.check.outputs.skip != 'true'
        run: npx playwright install chromium chromium-headless-shell ffmpeg

      - name: Junctions pra ms-playwright (electron-builder usa path relativo)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $src = "$env:LOCALAPPDATA\ms-playwright"
          $dst = "$PWD\ms-playwright"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null
          foreach ($name in 'chromium-1223','chromium_headless_shell-1223','ffmpeg-1011') {
            $target = "$src\$name"
            $link = "$dst\$name"
            if (Test-Path $target) {
              if (Test-Path $link) { Remove-Item $link -Recurse -Force }
              cmd /c mklink /J "$link" "$target" | Out-Null
              echo "OK: $name"
            } else {
              echo "FALTA: $target"
            }
          }

      - name: Build electron-builder
        if: steps.check.outputs.skip != 'true'
        run: npx electron-builder --win --x64 --publish=never

      - name: List artifacts
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          Get-ChildItem dist -File | Select-Object Name,@{N='MB';E={[math]::Round($_.Length/1MB,1)}} | Format-Table -AutoSize

      - name: Release notes from RELEASE_NOTES.md or fallback
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          if (Test-Path RELEASE_NOTES.md) {
            Copy-Item RELEASE_NOTES.md dist/RELEASE_NOTES.md
          } else {
            "Release v${{ steps.ver.outputs.version }}. Auto-update do PostMaster pega sozinho." | Out-File dist/RELEASE_NOTES.md -Encoding utf8
          }

      - name: Publish GitHub Release (cria ou re-upload assets)
        if: steps.check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $tag = '${{ steps.ver.outputs.tag }}'
          gh release create $tag `
            --repo ${{ github.repository }} `
            --title '${{ steps.ver.outputs.version }}' `
            --notes-file dist/RELEASE_NOTES.md `
            dist/PostMaster-Setup.exe `
            dist/PostMaster-Setup.exe.blockmap `
            dist/latest.yml
          if ($LASTEXITCODE -ne 0) {
            Write-Host "create falhou ($LASTEXITCODE), tentando upload com clobber..."
            $global:LASTEXITCODE = 0
            gh release upload $tag --repo ${{ github.repository }} --clobber `
              dist/PostMaster-Setup.exe dist/PostMaster-Setup.exe.blockmap dist/latest.yml
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
